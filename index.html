<style>
  :root{
    --bg:#0d1b2a; --panel:#16263a; --panel2:#1d3148;
    --line:#2b4359; --text:#eaf2fb; --sub:#9fb4c9; --accent:#4fc3f7;
    --good:#34d399; --warn:#fbbf24; --bad:#f87171; --gold:#ffd166;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
    background:linear-gradient(160deg,#0b1726,#0d1b2a 40%,#10243a);color:var(--text);
    min-height:100vh;padding:16px;line-height:1.5}
  .wrap{max-width:1100px;margin:0 auto;position:relative}
  .lang{position:absolute;top:0;right:0;display:flex;gap:2px;font-size:12px;z-index:5}
  .lang span{cursor:pointer;color:var(--sub);padding:3px 7px;border-radius:6px}
  .lang span.on{color:var(--text);background:var(--panel2)}
  header{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 14px;margin-bottom:6px;padding-right:64px}
  h1{font-size:22px;font-weight:700;letter-spacing:.5px}
  h1 .mt{color:var(--accent)}
  .meta{font-size:12.5px;color:var(--sub)}
  .bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin:10px 0 16px}
  button{background:var(--accent);color:#06243a;border:0;border-radius:8px;
    padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
  button:active{transform:translateY(1px)}
  #install{background:var(--gold);color:#3a2a00}
  .updated{font-size:12.5px;color:var(--sub)}
  .season{font-size:12.5px;background:#1d3148;border:1px solid var(--line);
    border-radius:8px;padding:7px 12px;color:var(--sub)}

  .thunder{background:rgba(248,113,113,.18);border:1px solid var(--bad);border-radius:12px;
    padding:11px 14px;font-size:13.5px;font-weight:600;color:#fff;display:none;margin-bottom:14px}
  .season.closed-pill{background:rgba(248,113,113,.2);border-color:var(--bad);color:#fff;font-weight:600}
  .stale{background:rgba(251,191,36,.14);border:1px solid var(--warn);border-radius:12px;
    padding:11px 14px;font-size:13px;color:var(--text);display:none;margin-bottom:14px}
  .err{background:rgba(248,113,113,.13);border:1px solid var(--bad);
    border-radius:12px;padding:14px;font-size:13.5px;display:none;margin-bottom:14px}

  .toprow{display:grid;grid-template-columns:1fr 1.4fr;gap:14px;margin-bottom:18px}
  @media(max-width:760px){.toprow{grid-template-columns:1fr}}
  .goraiko{border-radius:14px;padding:16px 18px;border:1px solid rgba(255,209,102,.45);
    background:linear-gradient(135deg,rgba(255,209,102,.16),rgba(255,140,66,.08))}
  .goraiko .lbl{font-size:13px;color:var(--gold);font-weight:600}
  .goraiko .big{display:flex;align-items:baseline;gap:10px;margin:6px 0 4px}
  .goraiko .pct{font-size:42px;font-weight:800;color:var(--gold)}
  .goraiko .grade{font-size:16px;font-weight:700}
  .goraiko .when{font-size:12.5px;color:var(--sub)}
  .goraiko .detail{font-size:12.5px;color:var(--sub);margin-top:6px}

  .verdict{border-radius:14px;padding:16px 18px;border:1px solid var(--line)}
  .verdict h2{font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .verdict p{font-size:13.5px}
  .v-good{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.5)}
  .v-warn{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.5)}
  .v-bad{background:rgba(248,113,113,.13);border-color:rgba(248,113,113,.55)}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block}

  .bclock{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-top:20px;margin-bottom:18px}
  .bc-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .bc-t{font-size:14px;font-weight:700}
  .tzsel{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12.5px;max-width:58%}
  .bc-row{padding:8px 0;border-top:1px solid var(--line)}
  .bc-row:first-child{border-top:0}
  .bc-l{font-size:12.5px;color:var(--sub);margin-right:8px}
  .bc-v{font-size:13.5px;font-weight:600}
  .bc-ad{font-size:12px;color:var(--sub);margin-top:2px}
  .enb{font-size:11px;padding:1px 7px;border-radius:20px;font-weight:600;margin-left:4px}
  .bc-wrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .bc-dial{flex:0 0 auto;margin:0 auto}
  .bc-svg{width:180px;height:180px;display:block}
  .bc-info{flex:1;min-width:210px}
  .bc-leg{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:8px;font-size:11.5px;color:var(--sub)}
  .bc-leg span{display:flex;align-items:center;gap:5px}
  .bc-leg i{width:10px;height:10px;border-radius:50%;display:inline-block}
  .bc-same{font-size:12px;color:var(--sub);margin-top:6px}
  .bc-note{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.5}
  .trail-head{font-size:15px;font-weight:700;margin:4px 0 10px}
  .tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
  @media(max-width:760px) and (min-width:561px){.tabs{grid-template-columns:repeat(2,minmax(0,1fr))}}
  .tab{background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 14px;font-size:13.5px;cursor:pointer;font-weight:600}
  .tab small{display:block;font-weight:400;color:var(--sub);font-size:11px;margin-top:2px}
  .tab.active{background:var(--accent);color:#06243a;border-color:var(--accent)}
  .tab.active small{color:#0a3a59}

  .trail-info{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:18px}
  .trail-info .tmeta{font-size:12.5px;color:var(--sub);margin-bottom:12px}
  .trail-info .tmeta b{color:var(--text)}
  .focus{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:6px}
  @media(max-width:760px){.focus{grid-template-columns:repeat(2,1fr)}}
  .fbox{background:var(--panel2);border-radius:10px;padding:12px;text-align:center;border:1px solid transparent}
  .fbox .fk{font-size:12px;color:var(--sub)}
  .fbox .fv{font-size:22px;font-weight:700;margin-top:3px}
  .fbox .fu{font-size:11.5px;color:var(--sub)}
  .fbox.alert{border-color:var(--bad);background:rgba(248,113,113,.12)}
  .fbox.warnb{border-color:var(--warn);background:rgba(251,191,36,.10)}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card .elev{font-size:12.5px;color:var(--sub)}
  .card .name{font-size:16px;font-weight:700;margin-bottom:10px}
  .card .now{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .card .icon{font-size:38px;line-height:1}
  .card .temp{font-size:34px;font-weight:700}
  .card .cond{font-size:13px;color:var(--sub)}
  .card .feels{font-size:12.5px;color:var(--sub)}
  .rows{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;font-size:13px}
  .row{display:flex;justify-content:space-between;background:var(--panel2);
    border-radius:8px;padding:7px 9px}
  .row .k{color:var(--sub)}
  .row .v{font-weight:600}
  .pill{font-size:11px;padding:1px 7px;border-radius:20px;font-weight:600;margin-left:6px}
  .p-good{background:rgba(52,211,153,.2);color:var(--good)}
  .p-warn{background:rgba(251,191,36,.2);color:var(--warn)}
  .p-bad{background:rgba(248,113,113,.22);color:var(--bad)}

  section h3{font-size:15px;margin:6px 0 12px;font-weight:700}
  .chart-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px 14px 6px;margin-bottom:20px}
  .chart-wrap{position:relative;height:300px}
  .legend{font-size:12px;color:var(--sub);margin:8px 2px 2px}

  .win-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-bottom:20px}
  @media(max-width:760px){.win-list{grid-template-columns:1fr}}
  .win{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .win.best{border-color:rgba(52,211,153,.55);background:rgba(52,211,153,.07)}
  .win.none{grid-column:1/-1;color:var(--sub);font-size:13.5px}
  .win-h{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .win-date{font-size:15px;font-weight:700}
  .win-tag{font-size:11.5px;background:rgba(255,209,102,.2);color:var(--gold);padding:2px 8px;border-radius:20px;font-weight:600}
  .win-time{font-size:16px;font-weight:700;color:var(--good)}
  .win-sub{font-size:12.5px;color:var(--sub);margin-top:3px}

  table{width:100%;border-collapse:collapse;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;overflow:hidden;font-size:13.5px}
  th,td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--line)}
  th{background:var(--panel2);color:var(--sub);font-weight:600}
  tr:last-child td{border-bottom:0}
  td.day{text-align:left;font-weight:600}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px}

  footer{margin-top:24px;font-size:11.5px;color:var(--sub);text-align:center;line-height:1.7}
  @media(max-width:560px){
    body{padding:12px}
    h1{font-size:20px}
    header{padding-right:58px}
    .lang{font-size:13px}
    .lang span{padding:4px 9px}
    table{font-size:12.5px}
    th,td{padding:8px 8px;white-space:nowrap}
    .card .temp{font-size:30px}
    .goraiko .pct{font-size:36px}
    .win-time{font-size:15px}
    .tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}
  }
  .links{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 14px;margin:12px 0 4px}
  .links a{color:var(--accent);text-decoration:none;background:var(--panel);
    border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:600}
  .links a:hover{background:var(--panel2)}
</style>

<script>
const LAT=35.3606, LON=138.7274;

const BASE  ={elev:860, icon:'🏞️', lat:35.5000,lon:138.7600, name:{zh:'山脚 · 河口湖一带',en:'Base · Kawaguchiko'}};
const SUMMIT={elev:3776,icon:'⛰️', lat:LAT,    lon:LON,      name:{zh:'山顶 · 剑峰',en:'Summit · Kengamine'}};

const TRAILS={
  yoshida:{lat:35.3942,lon:138.7335,elev:2305,icon:'🚌',
    name:{zh:'吉田口',en:'Yoshida'},side:{zh:'北麓 · 山梨县',en:'North · Yamanashi'},
    diff:{zh:'中等 · 最热门',en:'Moderate · most popular'},huts:{zh:'山小屋/救护点最多',en:'most huts & aid'},
    desc:{zh:'设施最完善、夜间也有补给与救援，初次登山首选；旺季人流大。上下分道。',
      en:'Best facilities, overnight supplies & rescue; top pick for first-timers; crowded in peak. Separate up/down paths.'}},
  fujinomiya:{lat:35.3357,lon:138.7320,elev:2380,icon:'⛩️',
    name:{zh:'富士宫口',en:'Fujinomiya'},side:{zh:'南麓 · 静冈县',en:'South · Shizuoka'},
    diff:{zh:'较陡 · 距顶最近',en:'Steep · closest to summit'},huts:{zh:'较多',en:'several huts'},
    desc:{zh:'起点最高、路程最短但坡度大；上下同一条路，会车较多。',
      en:'Highest trailhead, shortest route but steep; shared up/down path, congested.'}},
  subashiri:{lat:35.3960,lon:138.7660,elev:1970,icon:'🌲',
    name:{zh:'须走口',en:'Subashiri'},side:{zh:'东麓 · 静冈县',en:'East · Shizuoka'},
    diff:{zh:'中等 · 较清静',en:'Moderate · quieter'},huts:{zh:'中等',en:'some huts'},
    desc:{zh:'低段森林遮蔽好、人较少；本八合目与吉田道汇合，下山有“砂走”。',
      en:'Forested lower section, fewer people; merges with Yoshida at Hon-8th; sandy "sunabashiri" descent.'}},
  gotemba:{lat:35.3300,lon:138.7930,elev:1440,icon:'🏜️',
    name:{zh:'御殿场口',en:'Gotemba'},side:{zh:'东南麓 · 静冈县',en:'Southeast · Shizuoka'},
    diff:{zh:'最长最难 · 老手向',en:'Longest & hardest · for the fit'},huts:{zh:'最少',en:'fewest huts'},
    desc:{zh:'起点最低、距离与爬升最大，山小屋稀少，适合体力强者；下山“大砂走”著名。',
      en:'Lowest trailhead, greatest distance & ascent, sparse huts; for strong hikers; famous "Osunabashiri" sand descent.'}},
};
let currentTrail='yoshida';

// 身体时钟：家乡时区 + 昼夜节律精力估算
let homeTZ=(function(){try{return localStorage.getItem('fujitz')||Intl.DateTimeFormat().resolvedOptions().timeZone||'Asia/Tokyo';}catch(_){return 'Asia/Tokyo';}})();
const TZLIST=[
['Pacific/Pago_Pago','萨摩亚 UTC-11'],['Pacific/Honolulu','夏威夷 UTC-10'],['America/Anchorage','阿拉斯加 UTC-9'],
['America/Los_Angeles','美西 Los Angeles UTC-8'],['America/Denver','美山区 Denver UTC-7'],['America/Chicago','美中 Chicago UTC-6'],
['America/New_York','美东 New York UTC-5'],['America/Halifax','大西洋 Halifax UTC-4'],['America/Sao_Paulo','圣保罗 UTC-3'],
['Atlantic/Azores','亚速尔 UTC-1'],['Europe/London','伦敦 London UTC+0'],['Europe/Paris','欧洲中部 CET UTC+1'],
['Europe/Athens','东欧/雅典 UTC+2'],['Europe/Moscow','莫斯科 UTC+3'],['Asia/Tehran','德黑兰 UTC+3:30'],
['Asia/Dubai','迪拜 UTC+4'],['Asia/Karachi','卡拉奇 UTC+5'],['Asia/Kolkata','印度 UTC+5:30'],['Asia/Dhaka','达卡 UTC+6'],
['Asia/Bangkok','曼谷 UTC+7'],['Asia/Shanghai','中国大陆 (北京/上海) UTC+8'],['Asia/Hong_Kong','中国港澳 (香港) UTC+8'],
['Asia/Taipei','中国台北 UTC+8'],['Asia/Singapore','新加坡 UTC+8'],['Asia/Tokyo','日本 JST UTC+9'],['Asia/Seoul','首尔 UTC+9'],
['Australia/Adelaide','阿德莱德 UTC+9:30'],['Australia/Sydney','悉尼 Sydney UTC+10'],['Pacific/Noumea','新喀里多尼亚 UTC+11'],
['Pacific/Auckland','奥克兰 Auckland UTC+12'],['UTC','UTC']];
const EN_MAP=[2,3,3,3,3,2,2,1,0,0,0,0,1,2,2,1,1,0,0,0,1,1,2,2];
const EN_HEX=['#34d399','#5ec8ff','#fbbf24','#f87171'];
function energyIdx(hf){return EN_MAP[((Math.floor(hf)%24)+24)%24];}
function tzMin(tz,date){try{const dtf=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});const p={};dtf.formatToParts(date).forEach(x=>{p[x.type]=x.value;});let h=p.hour;if(h==='24')h='00';const asUTC=Date.UTC(+p.year,+p.month-1,+p.day,+h,+p.minute,+p.second);return Math.round((asUTC-date.getTime())/60000);}catch(_){return -new Date().getTimezoneOffset();}}
function jstToUTC(s,offSec){return Date.parse(s.slice(0,16)+':00Z')-offSec*1000;}
function bodyHM(jstStr,offSec){const utc=jstToUTC(jstStr,offSec);const off=tzMin(homeTZ,new Date(utc));const d=new Date(utc+off*60000);return {h:d.getUTCHours(),m:d.getUTCMinutes(),hf:d.getUTCHours()+d.getUTCMinutes()/60};}
function hm2(o){return String(o.h).padStart(2,'0')+':'+String(o.m).padStart(2,'0');}
function enBadge(hf){const i=energyIdx(hf),h=EN_HEX[i];return `<span class="enb" style="background:${h}22;color:${h}">${L().enLevels[i]}</span>`;}

// WMO: code -> [emoji, zh, en]
const WMO={
  0:['☀️','晴','Clear'],1:['🌤️','大致晴朗','Mostly clear'],2:['⛅','局部多云','Partly cloudy'],3:['☁️','阴','Overcast'],
  45:['🌫️','雾','Fog'],48:['🌫️','雾凇','Rime fog'],

let lang=(function(){try{return localStorage.getItem('fujilang')||((navigator.language||'').toLowerCase().indexOf('zh')===0?'zh':'en');}catch(_){return 'zh';}})();
function L(){return I18N[lang];}
function loc(){return L().loc;}

function wmoIcon(c){return (WMO[c]||['❓'])[0];}
function wmoName(c){const w=WMO[c]||['❓','未知','Unknown'];return lang==='zh'?w[1]:w[2];}
function windCls(ms){return ms<8?'p-good':ms<12?'p-warn':'p-bad';}
function windLbl(ms){const i=ms<8?0:ms<12?1:ms<18?2:3;return L().windLevels[i];}
function fmtDir(d){return L().dirs[Math.round(d/45)%8]+L().windSuffix;}
function hourIdx(d){const t=d.current.time;let i=d.hourly.time.findIndex(x=>x===t);return i<0?0:i;}

const cache={};
const LSK='fujiwx_';
async function fetchPoint(P,id){
  const p=new URLSearchParams({latitude:P.lat,longitude:P.lon,elevation:P.elev,
    current:'temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,cloud_cover,wind_speed_10m,wind_gusts_10m,wind_direction_10m',
    hourly:'temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,cloud_cover,visibility',
    daily:'weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum,wind_speed_10m_max,wind_gusts_10m_max,sunrise,sunset',
    timezone:'Asia/Tokyo',forecast_days:7,wind_speed_unit:'ms'});
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?'+p.toString());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    try{localStorage.setItem(LSK+id,JSON.stringify({t:Date.now(),data}));}catch(_){}
    data.__stale=false;return data;
  }catch(e){
    try{const raw=localStorage.getItem(LSK+id);
      if(raw){const o=JSON.parse(raw);o.data.__stale=true;o.data.__t=o.t;return o.data;}}catch(_){}
    throw e;
  }
}
async function getPoint(id,P){if(cache[id])return cache[id];cache[id]=await fetchPoint(P,id);return cache[id];}

function goraiko(summit){
  const d=summit.daily, now=new Date(summit.current.time).getTime();
  let di=0; for(let k=0;k<d.sunrise.length;k++){if(new Date(d.sunrise[k]).getTime()>now){di=k;break;}di=k;}
  if(new Date(d.sunrise[0]).getTime()>now) di=0;
  const srTime=new Date(d.sunrise[di]);
  const h=summit.hourly;
  let hi=h.time.findIndex(t=>new Date(t).getTime()>=srTime.getTime());
  if(hi<0)hi=0;
  const idxs=[Math.max(0,hi-1),hi];
  let cloud=0,pop=0,fog=false,n=0;
  idxs.forEach(j=>{cloud+=h.cloud_cover[j];pop=Math.max(pop,h.precipitation_probability[j]||0);
    const code=h.weather_code[j];if(code===45||code===48)fog=true;n++;});
  cloud/=n;
  let prob=100-cloud;
  if(pop>=60)prob*=0.3; else if(pop>=30)prob*=0.6;
  if(fog)prob*=0.5;
  prob=Math.max(0,Math.min(95,Math.round(prob)));
  let gi,col;
  if(prob>=70){gi=0;col='var(--good)';}
  else if(prob>=50){gi=1;col='var(--good)';}
  else if(prob>=30){gi=2;col='var(--warn)';}
  else if(prob>=15){gi=3;col='var(--warn)';}
  else{gi=4;col='var(--bad)';}
  const dayLbl=di===0?(srTime.getTime()>now?L().todayM:L().tmrM):L().tmrM;
  document.getElementById('gk-pct').textContent=prob+'%';
  document.getElementById('gk-pct').style.color=col;
  document.getElementById('gk-grade').textContent=L().gkGrades[gi];
  document.getElementById('gk-grade').style.color=col;
  document.getElementById('gk-when').textContent=L().gkWhen(dayLbl,srTime.toLocaleTimeString(loc(),{hour:'2-digit',minute:'2-digit'}));
  document.getElementById('gk-detail').textContent=L().gkDetail(Math.round(cloud),pop,fog);
}

function assess(summit){
  const c=summit.current,v=document.getElementById('verdict'),txt=document.getElementById('verdict-text');
  const R=L().r; let level='good',reasons=[];const code=c.weather_code;
  const thunder=code>=95, heavy=[65,82,75,86,99,67].includes(code), anyP=c.precipitation>0||code>=51;
  if(c.wind_gusts_10m>=18||c.wind_speed_10m>=18){level='bad';reasons.push(R.gustEx(c.wind_gusts_10m.toFixed(0)));}
  else if(c.wind_gusts_10m>=12||c.wind_speed_10m>=12){level='bad';reasons.push(R.gustStr(c.wind_gusts_10m.toFixed(0)));}
  else if(c.wind_speed_10m>=8){if(level==='good')level='warn';reasons.push(R.windMod(c.wind_speed_10m.toFixed(0)));}
  if(thunder){level='bad';reasons.push(R.thunder);}
  else if(heavy){level='bad';reasons.push(R.heavy);}
  else if(anyP){if(level==='good')level='warn';reasons.push(R.anyP);}
  if(c.apparent_temperature<=0){if(level==='good')level='warn';reasons.push(R.cold(Math.round(c.apparent_temperature)));}
  const i=hourIdx(summit),vis=summit.hourly.visibility[i];
  if(vis!=null&&vis<1000){if(level==='good')level='warn';reasons.push(R.lowVis);}
  v.className='verdict '+(level==='good'?'v-good':level==='warn'?'v-warn':'v-bad');
  const col=level==='good'?'var(--good)':level==='warn'?'var(--warn)':'var(--bad)';
  const head=level==='good'?L().vGood:level==='warn'?L().vWarn:L().vBad;
  document.getElementById('verdict-h').innerHTML=`<span class="dot" style="background:${col}"></span> ${L().verdictTitle} — ${head}`;
  txt.innerHTML=reasons.length?reasons.map(r=>'· '+r).join('<br>'):R.none;
}

function thunderAlert(summit){
  const h=summit.hourly, now=new Date(summit.current.time).getTime(), limit=now+48*3600000;
  let ranges=[],cur=null;
  for(let i=0;i<h.time.length;i++){
    const tt=new Date(h.time[i]).getTime();
    if(tt<now)continue; if(tt>limit)break;
    if(h.weather_code[i]>=95){ if(!cur)cur={s:h.time[i]}; cur.e=h.time[i]; }
    else if(cur){ranges.push(cur);cur=null;}
  }
  if(cur)ranges.push(cur);
  const el=document.getElementById('thunder');
  if(!ranges.length){el.style.display='none';return;}
  const txt=ranges.map(r=>{
    const s=new Date(r.s), e=new Date(new Date(r.e).getTime()+3600000);
    const d=s.toLocaleDateString(loc(),{month:'numeric',day:'numeric'});
    const t1=s.toLocaleTimeString(loc(),{hour:'2-digit',minute:'2-digit'});
    const t2=e.toLocaleTimeString(loc(),{hour:'2-digit',minute:'2-digit'});
    return `${d} ${t1}–${t2}`;
  }).join('；');
  el.style.display='block';
  el.textContent=L().thunderAlert(txt);
}

function drawChart(summit){
  const h=summit.hourly,now=new Date(summit.current.time).getTime();
  let start=h.time.findIndex(t=>new Date(t).getTime()>=now);if(start<0)start=0;
  const end=Math.min(start+24,h.time.length),labels=[],gust=[],pop=[],feels=[],thr=[];
  for(let i=start;i<end;i++){labels.push(new Date(h.time[i]).toLocaleTimeString(loc(),{hour:'2-digit'}));
    gust.push(h.wind_gusts_10m[i]);pop.push(h.precipitation_probability[i]);feels.push(h.apparent_temperature[i]);
    thr.push(h.weather_code[i]>=95?100:null);}
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('chart'),{data:{labels,datasets:[
    {type:'bar',label:L().cThunder,data:thr,yAxisID:'y1',grouped:false,backgroundColor:'rgba(248,113,113,.22)',borderWidth:0,barPercentage:1,categoryPercentage:1,order:4},
    {type:'bar',label:L().cPrecip,data:pop,yAxisID:'y1',backgroundColor:'rgba(79,195,247,.35)',borderRadius:3,order:3},
    {type:'line',label:L().cGustL,data:gust,yAxisID:'y',borderColor:'#f87171',backgroundColor:'#f87171',tension:.3,pointRadius:0,borderWidth:2,order:1},
    {type:'line',label:L().cFeelsL,data:feels,yAxisID:'y2',borderColor:'#fbbf24',backgroundColor:'#fbbf24',tension:.3,pointRadius:0,borderWidth:2,borderDash:[4,3],order:2}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:'#9fb4c9',boxWidth:14,font:{size:11}}}},
    scales:{x:{ticks:{color:'#9fb4c9',maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{color:'rgba(255,255,255,.05)'}},
      y:{position:'left',title:{display:true,text:L().axWind,color:'#f87171'},ticks:{color:'#9fb4c9'},grid:{color:'rgba(255,255,255,.06)'}},
      y1:{position:'right',min:0,max:100,title:{display:true,text:L().axPrecip,color:'#4fc3f7'},ticks:{color:'#9fb4c9'},grid:{display:false}},
      y2:{display:false}}}});
}

function bestWindows(summit){
  const h=summit.hourly, now=new Date(summit.current.time).getTime();
  const sunHrs=new Set((summit.daily.sunrise||[]).map(s=>s.slice(0,13)));
  const runs=[]; let cur=null;
  for(let i=0;i<h.time.length;i++){
    if(new Date(h.time[i]).getTime()<now) continue;
    const g=h.wind_gusts_10m[i], code=h.weather_code[i], pop=h.precipitation_probability[i], vis=h.visibility[i];
    const ok = g<12 && code<51 && code!==45 && code!==48 && (vis==null||vis>=1500) && (pop==null||pop<50);
    if(ok){ if(!cur)cur={items:[]}; cur.items.push({t:h.time[i],g,code,pop}); }
    else if(cur){runs.push(cur);cur=null;}
  }
  if(cur)runs.push(cur);
  return runs.filter(r=>r.items.length>=3).slice(0,4).map(r=>{
    const its=r.items, maxG=Math.max(...its.map(x=>x.g));
    const clear=its.filter(x=>x.code<=1).length/its.length>0.5;
    const hasSunrise=its.some(x=>sunHrs.has(x.t.slice(0,13)));
    return {start:its[0].t, end:its[its.length-1].t, maxG, clear, hasSunrise, len:its.length};
  });
}
function drawWindows(summit){
  const ws=bestWindows(summit), el=document.getElementById('windows');
  if(!ws.length){el.innerHTML=`<div class="win none">${L().winNone}</div>`;return;}
  const offSec=summit.utc_offset_seconds||32400;
  el.innerHTML=ws.map((w,idx)=>{
    const s=new Date(w.start), e=new Date(new Date(w.end).getTime()+3600000);
    const bw=bodyHM(w.start,offSec);
    const dl=s.toLocaleDateString(loc(),{month:'numeric',day:'numeric',weekday:'short'});
    const t1=s.toLocaleTimeString(loc(),{hour:'2-digit',minute:'2-digit'});
    const sameDay=s.toDateString()===e.toDateString();
    const t2=(sameDay?'':e.toLocaleDateString(loc(),{month:'numeric',day:'numeric'})+' ')+e.toLocaleTimeString(loc(),{hour:'2-digit',minute:'2-digit'});
    return `<div class="win${idx===0?' best':''}">
      <div class="win-h"><span class="win-date">${dl}</span>${idx===0?`<span class="win-tag" style="background:rgba(52,211,153,.2);color:var(--good)">${L().winBest}</span>`:''}${w.hasSunrise?`<span class="win-tag">${L().winSunrise}</span>`:''}</div>
      <div class="win-time">${t1} – ${t2}</div>
      <div class="win-sub">${L().winSub(w.len,Math.ceil(w.maxG),w.clear)}</div>
      <div class="win-sub">${L().bcBody} ${hm2(bw)} ${enBadge(bw.hf)}</div>
    </div>`;
  }).join('');
}

function drawDaily(summit){
  const d=summit.daily,H=L().dHead;
  let html=`<thead><tr><th>${H[0]}</th><th>${H[1]}</th><th>${H[2]}</th><th>${H[3]}</th><th>${H[4]}</th><th>${H[5]}</th><th>${H[6]}</th></tr></thead><tbody>`;
  for(let i=0;i<d.time.length;i++){const dt=new Date(d.time[i]);
    const day=i===0?L().today:dt.toLocaleDateString(loc(),{month:'numeric',day:'numeric',weekday:'short'});
    const sr=new Date(d.sunrise[i]).toLocaleTimeString(loc(),{hour:'2-digit',minute:'2-digit'});
    const ss=new Date(d.sunset[i]).toLocaleTimeString(loc(),{hour:'2-digit',minute:'2-digit'});
    const gcls=windCls(d.wind_gusts_10m_max[i]);
    html+=`<tr><td class="day">${day}</td><td>${wmoIcon(d.weather_code[i])} ${wmoName(d.weather_code[i])}</td>
      <td>${Math.round(d.temperature_2m_max[i])}° / ${Math.round(d.temperature_2m_min[i])}°</td>
      <td>${d.precipitation_probability_max[i]??'—'}%</td><td>${d.precipitation_sum[i].toFixed(1)} mm</td>
      <td>${d.wind_gusts_10m_max[i].toFixed(0)} m/s <span class="pill ${gcls}">${windLbl(d.wind_gusts_10m_max[i])}</span></td>
      <td>🌅${sr} 🌇${ss}</td></tr>`;}
  document.getElementById('daily').innerHTML=html+'</tbody>';
}

function renderTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  Object.entries(TRAILS).forEach(([id,T])=>{
    el.insertAdjacentHTML('beforeend',
      `<div class="tab ${id===currentTrail?'active':''}" data-id="${id}">${T.icon} ${T.name[lang]}<small>${T.elev}m · ${T.diff[lang]}</small></div>`);
  });
  el.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{currentTrail=t.dataset.id;load();}));
}

function populateTZ(){
  const sel=document.getElementById('tz'); if(!sel) return;
  const list=TZLIST.slice();
  if(!list.some(z=>z[0]===homeTZ)) list.unshift([homeTZ,homeTZ]);
  sel.innerHTML=list.map(z=>`<option value="${z[0]}">${z[1]}</option>`).join('');
  sel.value=homeTZ;
  sel.onchange=()=>{homeTZ=sel.value;try{localStorage.setItem('fujitz',homeTZ);}catch(_){}
    if(LAST){renderBodyClock(LAST.summit);drawWindows(LAST.summit);}};
}
function renderBodyClock(summit){
  const el=document.getElementById('bc-body'); if(!el) return;
  const offSec=summit.utc_offset_seconds||32400;
  const d=summit.daily, now=new Date(summit.current.time).getTime();
  let di=0; for(let k=0;k<d.sunrise.length;k++){if(new Date(d.sunrise[k]).getTime()>now){di=k;break;}di=k;}
  if(new Date(d.sunrise[0]).getTime()>now) di=0;
  const srStr=d.sunrise[di], srB=bodyHM(srStr,offSec);
  const ws=bestWindows(summit), winStr=ws.length?ws[0].start:null, winB=winStr?bodyHM(winStr,offSec):null;
  const homeNow=new Date(Date.now()+tzMin(homeTZ,new Date())*60000), nowHf=homeNow.getUTCHours()+homeNow.getUTCMinutes()/60;
  const cx=100,cy=100,R=92;
  const polar=(r,deg)=>[cx+r*Math.sin(deg*Math.PI/180), cy-r*Math.cos(deg*Math.PI/180)];
  const ni=energyIdx(nowHf);
  const halo=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${EN_HEX[ni]}" stroke-width="6" opacity="0.55"/><circle cx="${cx}" cy="${cy}" r="${R-4}" fill="#16263a" stroke="#2b4359" stroke-width="1"/>`;
  let ticks='';
  for(let h=0;h<12;h++){const major=(h%3===0),a=h*30,o=polar(R-7,a),i2=polar(major?R-16:R-12,a);
    ticks+=`<line x1="${o[0].toFixed(1)}" y1="${o[1].toFixed(1)}" x2="${i2[0].toFixed(1)}" y2="${i2[1].toFixed(1)}" stroke="#9fb4c9" stroke-width="${major?2.5:1.2}" opacity="${major?0.9:0.45}"/>`;}
  let nums=''; [['12',0],['3',90],['6',180],['9',270]].forEach(p=>{const q=polar(R-30,p[1]);nums+=`<text x="${q[0].toFixed(1)}" y="${(q[1]+5).toFixed(1)}" text-anchor="middle" font-size="14" font-weight="700" fill="#eaf2fb">${p[0]}</text>`;});
  const ca=b=>((b.h%12)+b.m/60)*30;
  const mk=(b,emo)=>{const m=polar(R-46,ca(b));return `<text x="${m[0].toFixed(1)}" y="${(m[1]+5).toFixed(1)}" text-anchor="middle" font-size="14">${emo}</text>`;};
  let marks=mk(srB,'🌅'); if(winB)marks+=mk(winB,'🎯');
  const minA=homeNow.getUTCMinutes()*6, hourA=((homeNow.getUTCHours()%12)+homeNow.getUTCMinutes()/60)*30;
  const mh=polar(R-24,minA), hh=polar(R-50,hourA);
  const hands=`<line x1="${cx}" y1="${cy}" x2="${hh[0].toFixed(1)}" y2="${hh[1].toFixed(1)}" stroke="#eaf2fb" stroke-width="4.5" stroke-linecap="round"/><line x1="${cx}" y1="${cy}" x2="${mh[0].toFixed(1)}" y2="${mh[1].toFixed(1)}" stroke="#eaf2fb" stroke-width="2.5" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="4.5" fill="${EN_HEX[ni]}"/>`;
  const svg=`<svg viewBox="-14 -14 228 228" class="bc-svg" role="img" aria-label="body clock">${halo}${ticks}${nums}${marks}${hands}</svg>`;
  const row=(lbl,jstStr,b)=>{const i=energyIdx(b.hf);return `<div class="bc-row"><span class="bc-l">${lbl}</span> <span class="bc-v">${jstStr.slice(11,16)} JST ${L().bcArrow} <b>${hm2(b)}</b> ${enBadge(b.hf)}</span><div class="bc-ad">${L().enAdvice[i]}</div></div>`;};
  let info=`<div class="bc-row"><span class="bc-l">${L().bcNow}</span> <span class="bc-v"><b>${hm2({h:homeNow.getUTCHours(),m:homeNow.getUTCMinutes()})}</b> ${enBadge(nowHf)}</span></div>`;
  info+=row('🌅 '+L().bcSunrise, srStr, srB);
  if(winB)info+=row('🎯 '+L().bcWindow, winStr, winB);
  const legend=`<div class="bc-leg">${L().enLevels.map((n,i)=>`<span><i style="background:${EN_HEX[i]}"></i>${n}</span>`).join('')}</div>`;
  const same=tzMin(homeTZ,new Date())===Math.round(offSec/60)?`<div class="bc-same">${L().bcSame}</div>`:'';
  el.innerHTML=`<div class="bc-wrap"><div class="bc-dial">${svg}</div><div class="bc-info">${info}${legend}${same}</div></div><div class="bc-note">${L().bcNote}</div>`;
}

function render(base,trail,summit){
  document.getElementById('err').style.display='none';
  goraiko(summit);
  assess(summit);
  thunderAlert(summit);
  populateTZ();
  renderBodyClock(summit);
  drawWindows(summit);
  const T=TRAILS[currentTrail];
  document.getElementById('trail-info').innerHTML=renderTrailInfo(T,trail);
  document.getElementById('cards').innerHTML=
    levelCard({elev:BASE.elev,icon:BASE.icon,name:BASE.name[lang]},base)+
    levelCard({elev:T.elev,icon:T.icon,name:T.name[lang]+L().fifth},trail)+
    levelCard({elev:SUMMIT.elev,icon:SUMMIT.icon,name:SUMMIT.name[lang]},summit);
  drawChart(summit);drawDaily(summit);
  const t=new Date(summit.current.time);
  document.getElementById('updated').textContent=L().updatedAt(t.toLocaleString(loc(),{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}));
}

function setSeason(){
  const now=new Date(),m=now.getMonth()+1,day=now.getDate();
  const open=((m===7)||(m===8)||(m===9&&day<=10));
  const pill=document.getElementById('season');
  pill.textContent=open?L().seasonOpen:L().seasonClosed;
  pill.classList.toggle('closed-pill',!open);
}

function applyStatic(){
  document.documentElement.lang=L().htmlLang;
  document.getElementById('h1').innerHTML=L().title;
  document.getElementById('meta').textContent=L().meta;
  document.getElementById('refresh').textContent=L().refresh;
  document.getElementById('install').textContent=L().install;
  document.getElementById('gk-lbl').textContent=L().gkLbl;
  document.getElementById('trail-head').textContent=L().trailHead;
  document.getElementById('bc-title').textContent=L().bcTitle;
  const tzs=document.getElementById('tz'); if(tzs) tzs.title=L().bcTz;
  document.getElementById('h-trend').textContent=L().hTrend;
  document.getElementById('legend').textContent=L().legend;
  document.getElementById('h-windows').textContent=L().hWindows;
  document.getElementById('h-daily').textContent=L().hDaily;
  document.getElementById('foot1').textContent=L().foot1;
  document.getElementById('foot2').textContent=L().foot2;
  document.getElementById('foot3').textContent=L().foot3;
  L().links.forEach((t,i)=>{const a=document.getElementById('lnk'+i);if(a)a.textContent=t;});
}

function updateLangUI(){document.querySelectorAll('#lang span').forEach(s=>s.classList.toggle('on',s.dataset.l===lang));}
function setLang(x){
  if(x===lang)return; lang=x;
  try{localStorage.setItem('fujilang',x);}catch(_){}
  updateLangUI(); applyStatic(); setSeason(); renderTabs();
  if(LAST){render(LAST.base,LAST.trail,LAST.summit);}
}
document.querySelectorAll('#lang span').forEach(s=>s.addEventListener('click',()=>setLang(s.dataset.l)));

async function load(){
  renderTabs();
  document.getElementById('updated').textContent=L().updating;
  try{
    const T=TRAILS[currentTrail];
    const [base,trail,summit]=await Promise.all([
      getPoint('base',BASE),
      getPoint('trail_'+currentTrail,T),
      getPoint('summit',SUMMIT),
    ]);
    LAST={base,trail,summit};
    render(base,trail,summit);
    const stale=[base,trail,summit].find(d=>d.__stale);
    const sb=document.getElementById('stale');
    if(stale){const tt=new Date(stale.__t);sb.style.display='block';
      sb.textContent=L().stale(tt.toLocaleString(loc(),{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}));}
    else sb.style.display='none';
  }catch(e){
    const err=document.getElementById('err');err.style.display='block';
    err.textContent=L().err(e.message);
    document.getElementById('updated').textContent=L().loadFail;
  }
}

document.getElementById('refresh').addEventListener('click',()=>{for(const k in cache)delete cache[k];load();});

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;
  document.getElementById('install').style.display='';});
document.getElementById('install').addEventListener('click',async()=>{
  if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;
  deferredPrompt=null;document.getElementById('install').style.display='none';});
window.addEventListener('appinstalled',()=>{document.getElementById('install').style.display='none';});
if('serviceWorker' in navigator){
  let hadController=!!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{if(hadController)location.reload();});
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js',{updateViaCache:'none'}).then(reg=>{reg.update();}).catch(()=>{});});
}

updateLangUI(); applyStatic(); setSeason(); renderTabs(); load();
setInterval(()=>{for(const k in cache)delete cache[k];load();},10*60*1000);
setInterval(()=>{if(LAST)renderBodyClock(LAST.summit);},60000);
</script>

<script>
// 自定义埋点：逐模块停留时长 + 关键点击，上报到 Microsoft Clarity
(function(){
  function C(){return (typeof window.clarity==='function')?window.clarity:null;}
  function tag(k,v){const c=C();if(c){try{c('set',k,v);}catch(_){}}}
  function ev(n){const c=C();if(c){try{c('event',n);}catch(_){}}}
  function bucket(s){if(s<10)return'0-10s';if(s<30)return'10-30s';if(s<60)return'30-60s';if(s<180)return'1-3m';if(s<300)return'3-5m';return'5m+';}
  const MODULES=[['verdict','安全评估'],['goraiko','御来光'],['tabs','线路选择'],['trail-info','线路实况'],['cards','三高度'],['chart','24h趋势'],['windows','推荐窗口'],['daily','7天预报'],['bclock','身体时钟']];
  const acc={},vis={}; MODULES.forEach(m=>{acc[m[0]]=0;vis[m[0]]=0;});
  const pageStart=Date.now();
  let flushed=false;
  function startObs(){
    if(!('IntersectionObserver' in window))return;
    const io=new IntersectionObserver(es=>{es.forEach(e=>{const id=e.target.id;
      const vp=(e.rootBounds&&e.rootBounds.height)||window.innerHeight;
      const need=Math.min(e.boundingClientRect.height,vp)*0.5;
      const seen=e.isIntersecting && e.intersectionRect.height>=need;
      if(seen){if(!vis[id])vis[id]=Date.now();}
      else if(vis[id]){acc[id]+=Date.now()-vis[id];vis[id]=0;}
    });},{threshold:[0,0.25,0.5,0.75,1]});
    MODULES.forEach(m=>{const el=document.getElementById(m[0]);if(el)io.observe(el);});
  }
  function flush(){
    if(flushed)return; flushed=true;
    MODULES.forEach(m=>{if(vis[m[0]]){acc[m[0]]+=Date.now()-vis[m[0]];vis[m[0]]=0;}});
    let top=null,topT=0;
    MODULES.forEach(m=>{const s=Math.round(acc[m[0]]/1000);if(s>0)tag('dwell_'+m[0],bucket(s));if(acc[m[0]]>topT){topT=acc[m[0]];top=m[1];}});
    if(top)tag('top_module',top);
    tag('total_dwell',bucket(Math.round((Date.now()-pageStart)/1000)));
  }
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')flush();});
  window.addEventListener('pagehide',flush);
  window.addEventListener('load',()=>{
    startObs();
    const bind=(id,n)=>{const el=document.getElementById(id);if(el)el.addEventListener('click',()=>ev(n));};
    bind('refresh','click_refresh'); bind('install','click_install');
    const tabs=document.getElementById('tabs'); if(tabs)tabs.addEventListener('click',e=>{const t=e.target.closest&&e.target.closest('.tab');if(t)ev('switch_trail_'+(t.dataset.id||''));});
    document.querySelectorAll('#lang span').forEach(s=>s.addEventListener('click',()=>ev('switch_lang_'+s.dataset.l)));
    const tz=document.getElementById('tz'); if(tz)tz.addEventListener('change',()=>ev('change_tz'));
    document.querySelectorAll('.links a').forEach(a=>a.addEventListener('click',()=>ev('click_official_link')));
  });
})();
</script>
